name: Echovita Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Echovita Scraper
        env:
          GITHUB_ACTIONS: "true"
        run: python Echovita_Links_Tool_V1.py

      - name: Send results via Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Echovita Scrape Results - Finished"
          body: "The Echovita scrape has finished. The result file is attached."
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: GitHub Scraper Bot <${{ secrets.SMTP_USERNAME }}>
          attachments: "*.xlsx"

      - name: Upload results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: "*.xlsx"
